name: Deploy to Firebase Hosting and Functions on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. בניית אפליקציית ה-React עם משתני הסביבה 
      - name: Install dependencies and build React
        run: npm ci && npm run build
        env:
          REACT_APP_BACKEND_URL: ${{ vars.REACT_APP_BACKEND_URL_LIVE }}
          REACT_APP_AUTH0_CLIENT_ID: ${{secrets.REACT_APP_AUTH0_CLIENT_ID}}
          REACT_APP_AUTH0_DOMAIN: ${{secrets.REACT_APP_AUTH0_DOMAIN}}
          REACT_APP_AUTH0_NAMESPACE: ${{secrets.REACT_APP_AUTH0_NAMESPACE}}

      # 2. התקנת תלויות של פונקציות הענן והעתקת קובץ ה-HTML פנימה
      - name: Prepare Cloud Functions
        run: |
          cd functions
          npm install
          cp ../build/index.html ./index.html

      # 3. הזדהות מול גוגל באמצעות ה-Secret הקיים שלך
      - name: Authenticate to Google Cloud
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_HANAREF_FD006 }}'

      # 4. פריסה כוללת של הכל (Hosting + Functions) כחבילה אחת אטומית
      - name: Install Firebase CLI and Deploy
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions,hosting --project hanaref-fd006